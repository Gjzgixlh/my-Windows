name: Windows-RDP
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Set up NGROK
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip
    - name: Authenticate NGROK
      run: .\ngrok\ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
    - name: Create Tunnel
      run: Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp 3389"
    - name: Keep Alive
      run: |
        $url = (Invoke-WebRequest -Uri http://localhost:4040/api/tunnels -UseBasicParsing | ConvertFrom-Json).tunnels[0].public_url
        Write-Host "--- 接続情報 ---"
        Write-Host "Address: $($url.Replace('tcp://', ''))"
        Write-Host "User: runneradmin"
        Write-Host "Pass: Password123!"
        while($true){ sleep 60 }
